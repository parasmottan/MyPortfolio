  <rect x="4" y="3" width="2.8" height="14" rx="1.2" fill="#ffffff"/>
  <!-- Bowl: upper right bump -->
  <path d="M 6.8 3 L 11.5 3 C 14.2 3 16 4.8 16 7.5 C 16 10.2 14.2 12 11.5 12 L 6.8 12 Z" fill="#ffffff"/>
  <!-- Inner cutout to make the bowl shape hollow -->
  <path d="M 9.2 5.2 L 11.2 5.2 C 12.7 5.2 13.6 6.1 13.6 7.5 C 13.6 8.9 12.7 9.8 11.2 9.8 L 9.2 9.8 Z" fill="#000000"/>
</svg>
